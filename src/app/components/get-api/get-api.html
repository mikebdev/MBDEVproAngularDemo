<div class="row">
    <div class="col-2">
        <button class="btn btn-success" (click)="getUsers()">Get Users</button> 
    </div>
    <!-- <div class="col-1"></div> -->
    <div class="col-2">
        <button class="btn btn-primary" (click)="getProducts()">Get Products</button> 
    </div>
    <div class="col-8"></div>
</div>
<hr>
<div class="row">
    <div class="col">
        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Website</th>
                </tr>
            </thead>
            <tbody>
                @for (item of userList; track $index) {
                    <tr>
                        <td>{{$index + 1}}</td>
                        <td>{{item.name}}</td>
                        <td>{{item.username}}</td>
                        <td>{{item.email}}</td>
                        <td>{{item.phone}}</td>
                        <td><a [href]="'http://' + item.website" target="_blank">{{ item.website }}</a></td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
    <div class="row">
        <div class="col-5"> 
            <select>
                @for (item of productList; track $index) {
                    <option value="{{item.product_id}}">{{item.name}}</option>
                }
            </select>
        </div>
    </div>
</div>

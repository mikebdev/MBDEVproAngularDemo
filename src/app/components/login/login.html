<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<div class="parent d-flex justify-content-center align-items-center min-vh-100">

    <!-- Background layers -->
    <div class="stars"></div>
    <div class="aurora">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Login card -->
    <div class="card-wrap">
        <div class="glass-card">

            <!-- Brand -->
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <span class="brand-name">MBDEVpro</span>
            </div>

            <!-- Heading -->
            <div>
                <h1 class="card-title">Welcome back</h1>
                <p class="card-subtitle">
                    Don't have an account? <a href="#">Create one</a>
                </p>
            </div>

            <!-- Form -->
            <form novalidate>
                <div class="field-row">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" [(ngModel)]="loginObj.email" id="email" name="email" class="form-control"
                        placeholder="Enter Email" autocomplete="email" />
                </div>

                <div class="field-row">
                    <label for="password" class="form-label">Password</label>
                    <div class="pw-wrap">
                        <input type="password" [(ngModel)]="loginObj.password" id="password" name="password"
                            class="form-control" placeholder="••••••••" autocomplete="current-password" />
                        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
                            <!-- eye icon -->
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M1.5 12s4-7 10.5-7 10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z" />
                                <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="remember-row">
                    <div class="form-check d-flex align-items-center gap-2">
                        <input class="form-check-input mt-0" type="checkbox" id="remember" />
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-signin" (click)="onLogin()">Sign in</button>
            </form>

            <!-- Divider -->
            <div class="divider">or continue with</div>

            <!-- Social -->
            <div class="d-flex flex-column gap-2">
                <a href="#" class="social-btn">
                    <!-- Google -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Continue with Google
                </a>
                <a href="#" class="social-btn">
                    <!-- GitHub -->
                    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                    </svg>
                    Continue with GitHub
                </a>
            </div>

        </div>
    </div>


</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Password toggle
    const pwField = document.getElementById('password');
    const pwToggle = document.getElementById('pwToggle');
    const eyeIcon = document.getElementById('eyeIcon');

    const eyeOpen = `
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M1.5 12s4-7 10.5-7 10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z"/>
      <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/>`;

    const eyeSlash = `
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 3l18 18M10.477 10.477A3 3 0 0013.5 13.5M6.26 6.26A10.46 10.46 0 001.5 12s4 7 10.5 7a10.46 10.46 0 005.74-1.74M9.88 4.12A10.45 10.45 0 0112 4c6.5 0 10.5 7 10.5 7a10.48 10.48 0 01-2.61 3.39"/>`;

    pwToggle.addEventListener('click', () => {
        const visible = pwField.type === 'text';
        pwField.type = visible ? 'password' : 'text';
        eyeIcon.innerHTML = visible ? eyeOpen : eyeSlash;
    });

    // Prevent real form submit for demo
    document.querySelector('form').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.querySelector('.btn-signin');
        btn.textContent = 'Signing in…';
        btn.disabled = true;
        setTimeout(() => {
            btn.textContent = 'Sign in';
            btn.disabled = false;
        }, 1800);
    });
</script>
